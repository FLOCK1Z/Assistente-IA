name: Compilar Assistente IA

# Isso diz ao GitHub para rodar a compilação sempre que você alterar o código
on:
  push:
    branches: [ main ]

jobs:
  build:
    # A matriz mágica: manda rodar em um PC Windows e num Linux ao mesmo tempo
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Clonar o código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar as Bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install requests rich pyinstaller

    - name: Compilar com PyInstaller
      run: pyinstaller --onefile assistente.py

    - name: Salvar o Executável Pronto
      uses: actions/upload-artifact@v4
      with:
        name: executavel-${{ matrix.os }}
        path: dist/*
